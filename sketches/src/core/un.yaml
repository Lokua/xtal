snapshot_sequence:
  type: snapshot_sequence
  beats: 16
  disabled: true
  # prettier-ignore
  snapshots: [
    1, 2, 3, 3, 4, 4, 4, 5, 5, 5, 5, 6, 6,
    6, 6, 5, 5, 5, 5, 4, 4, 4, 3, 3, 2, 1
  ]

# ------------------------------------------------------------------------------
#  Camera
# ------------------------------------------------------------------------------

camera:
  type: separator

cam_distance:
  var: cx
  type: slider
  range: [1.0, 8.0]
  default: 3.0
  step: 0.01

cam_y_angle:
  var: cy
  type: ramp
  beats: 12
  range: [0.0, 6.283185307179586]
  phase: 0.0

focal_len:
  var: cz
  type: slider
  range: [0.4, 3.0]
  default: 1.6
  step: 0.01

# ------------------------------------------------------------------------------
#  March
# ------------------------------------------------------------------------------

march:
  type: separator

# ------------------------------------------------------------------------------
#  Geometry
# ------------------------------------------------------------------------------

geometry:
  type: separator

sphere_radius:
  var: dy
  type: slider
  range: [0.2, 1.4]
  default: 0.72
  step: 0.01

blend_k:
  var: dz
  type: slider
  range: [0.6, 1.0]
  default: 0.65
  step: 0.001

# ------------------------------------------------------------------------------
#  Harmonic Distortion
# ------------------------------------------------------------------------------

harmonic_distortion:
  type: separator

harmonic_amp_1:
  var: fx
  type: slider
  range: [0.0, 0.3]
  default: 0.08
  step: 0.001

# harmonic_freq_1:
#   var: fy
#   type: slider
#   range: [0.0, 18.0]
#   default: 6.0
#   step: 0.01

harmonic_freq_1:
  var: fy
  type: triangle
  beats: 24
  range: [0.0, 6.0]

harmonic_amp_2:
  var: fz
  type: slider
  range: [0.0, 0.3]
  default: 0.06
  step: 0.001

# harmonic_freq_2:
#   var: fw
#   type: slider
#   range: [0.0, 18.0]
#   default: 8.0
#   step: 0.01

harmonic_freq_2:
  var: fy
  type: triangle
  beats: 32
  range: [0.0, 6.0]

# harmonic_warp:
#   var: gx
#   type: slider
#   range: [-24, 24]
#   default: 0.0
#   step: 0.001

harmonic_warp:
  var: gx
  type: triangle
  beats: 4
  range: [-6, 6]

harmonic_ridge:
  var: gy
  type: slider
  range: [0.0, 1.0]
  default: 0.35
  step: 0.01

harmonic_phase:
  var: gz
  type: slider
  range: [0.0, 6.283185307179586]
  default: 0.0
  step: 0.001

stretch_y:
  var: gw
  type: slider
  range: [-0.8, 0.8]
  default: 0.0
  step: 0.001

# ------------------------------------------------------------------------------
#  Structure
# ------------------------------------------------------------------------------

structure:
  type: separator

triangle_size:
  var: ky
  type: slider
  range: [0.0, 2.0]
  default: 0.9
  step: 0.01

triangle_rotation:
  var: kz
  type: slider
  range: [0.0, 6.283185307179586]
  default: 0.0
  step: 0.001

# ------------------------------------------------------------------------------
#  Topology Events
# ------------------------------------------------------------------------------

topology_events:
  type: separator

topology_drive:
  var: ry
  type: random_slewed
  beats: 1.0
  range: [0.0, 1.0]
  slew: 0.7
  delay: 0.0
  stem: 9147

topology_amount:
  var: qx
  type: slider
  range: [0.0, 1.0]
  default: 0.0
  step: 0.001

topology_split:
  var: qw
  type: slider
  range: [0.0, 1.0]
  default: 0.55
  step: 0.001

# ------------------------------------------------------------------------------
#  Satellites
# ------------------------------------------------------------------------------

satellites:
  type: separator

satellite_count:
  var: nx
  type: slider
  range: [0, 9]
  default: 4
  step: 1

satellite_radius:
  var: ny
  type: slider
  range: [0.0, 0.5]
  default: 0.11
  step: 0.001

satellite_orbit:
  var: nz
  type: slider
  range: [0.0, 1.8]
  default: 0.42
  step: 0.001

satellite_speed:
  var: ox
  type: slider
  range: [0.0, 4.0]
  default: 1.125
  step: 0.125

satellite_jitter:
  var: oz
  type: slider
  range: [0.0, 1.0]
  default: 0.35
  step: 0.001

satellite_breathe:
  var: ow
  type: slider
  range: [0.0, 1.0]
  default: 0.25
  step: 0.001

# ------------------------------------------------------------------------------
#  Movement
# ------------------------------------------------------------------------------

movement:
  type: separator

motion_speed:
  var: lx
  type: slider
  range: [0.25, 2.0]
  default: 0.25
  step: 0.25

motion_amount:
  var: ly
  type: slider
  range: [0.0, 1]
  default: 0.07
  step: 0.001

flow_amount:
  var: px
  type: slider
  range: [0.0, 1.0]
  default: 0.08
  step: 0.001

flow_scale:
  var: py
  type: slider
  range: [0.05, 3.0]
  default: 0.55
  step: 0.001

# ------------------------------------------------------------------------------
#  Blend
# ------------------------------------------------------------------------------

blend:
  type: separator

blend_pulse_amount:
  var: lz
  type: slider
  range: [0.0, 0.8]
  default: 0.08
  step: 0.001

blend_pulse_freq:
  var: lw
  type: slider
  range: [0.0, 4.0]
  default: 0.125
  step: 0.125

# ------------------------------------------------------------------------------
#  Lighting
# ------------------------------------------------------------------------------

lighting:
  type: separator

view:
  var: ew
  type: select
  default: final
  options:
    - final
    - normals
    - shadow
    - ao
    - diffuse
    - specular
    - rim
    - fresnel

# Like a flashlight beam. Turn this off and the shape loses directional light
# and feels flatter.
use_shadow:
  var: sx
  type: checkbox
  default: true

# Soft darkening in creases and tight spaces. Look for subtle dirt-like depth
# where parts of the blob fold into each other.
use_ao:
  var: sy
  type: checkbox
  default: true

# The main "base light" on surfaces facing the light. This is the big bright
# and dark shape read.
use_diffuse:
  var: sz
  type: checkbox
  default: true

# Shiny highlights (small bright glints). If this is off, glossy sparkle goes
# away.
use_specular:
  var: sw
  type: checkbox
  default: true

# Bright edge glow around silhouettes. Easy to spot as a neon-like border on
# the outer contour.
use_rim:
  var: tx
  type: checkbox
  default: true

# Edge tint that gets stronger at grazing angles. Look for colored sheen near
# edges, separate from specular glints.
use_fresnel:
  var: ty
  type: checkbox
  default: true

light_intensity:
  var: hw
  type: slider
  range: [0.0, 3.0]
  default: 1.0
  step: 0.01

rim_strength:
  var: jx
  type: slider
  range: [0.0, 4.0]
  default: 0.6
  step: 0.01

rim_power:
  var: jy
  type: slider
  range: [0.1, 12.0]
  default: 2.0
  step: 0.01

emissive_strength:
  var: jz
  type: slider
  range: [0.0, 4.0]
  default: 0.45
  step: 0.01

spec_power:
  var: jw
  type: slider
  range: [1.0, 256.0]
  default: 64.0
  step: 1

# ------------------------------------------------------------------------------
#  Color
# ------------------------------------------------------------------------------

color:
  type: separator

color_mix:
  var: aw
  type: slider
  range: [0.0, 1.0]
  default: 0.0
  step: 0.01

hue_shift:
  var: ex
  type: slider
  range: [-1.0, 1.0]
  default: 0.0
  step: 0.001

saturation:
  var: ey
  type: slider
  range: [0.0, 2.5]
  default: 1.0
  step: 0.01

contrast:
  var: ez
  type: slider
  range: [0.2, 2.5]
  default: 1.0
  step: 0.01

fog_density:
  var: cw
  type: slider
  range: [0.001, 0.2]
  default: 0.03
  step: 0.001

bg_darken:
  var: ux
  type: slider
  range: [0.0, 1.0]
  default: 0.0
  step: 0.01

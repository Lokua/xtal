# ------------------------------------------------------------------------------
#  Main
# ------------------------------------------------------------------------------

sequence:
  type: snapshot_sequence
  disabled: true
  beats: 32
  snapshots: [1, 2, 3, 4, 5, 6, 7, 8, 9, 0, 9, 8, 7, 6, 5, 4, 3, 2, 1]

grid_size:
  var: aw
  type: slider
  range: [4, 48]
  step: 1
  default: 16

circle_radius:
  var: bx
  type: slider
  range: [0.001, 1.0]
  default: 0.25

line_width:
  var: by
  type: slider
  range: [0.01, 3.0]
  default: 0.1

outer_spread:
  var: gx
  type: slider
  default: 0.01

t_wave:
  var: cy
  type: slider
  range: [0, 50]

ab_cd_mix:
  var: dw
  type: slider

ac_exp:
  var: cz
  type: slider
  range: [0, 5]
  default: 2

bd_exp:
  var: cw
  type: slider
  range: [0, 5]
  default: 2

ac_rotate:
  var: dx
  type: checkbox

ac_rotation_speed:
  var: dy
  type: slider
  range: [2, 32]
  step: 2
  default: 2
  disabled: not ac_rotate

# ------------------------------------------------------------------------------
#  a->b
# ------------------------------------------------------------------------------

ab_section:
  type: separator

ab_mix:
  var: cx
  type: slider

link_ab_amp:
  var: ix
  type: checkbox

link_ab_freq:
  var: iy
  type: checkbox

a_amp:
  var: bw
  type: slider
  range: [1, 15]
  default: 2

a_freq:
  var: bz
  type: slider
  range: [0, 10]
  default: 0.1

b_amp:
  var: hy
  type: slider
  range: [1, 15]
  default: 2
  disabled: link_ab_amp

b_freq:
  var: gw
  type: slider
  range: [0, 10]
  default: 0.1
  disabled: link_ab_freq

# ------------------------------------------------------------------------------
#  c->d
# ------------------------------------------------------------------------------

cd_section:
  type: separator

cd_mix:
  var: fx
  type: slider

link_cd_amp:
  var: iz
  type: checkbox

link_cd_freq:
  var: iw
  type: checkbox

c_amp:
  var: fy
  type: slider
  range: [1, 15]
  default: 2

c_freq:
  var: fz
  type: slider
  range: [0, 10]
  default: 0.1

d_amp:
  var: hz
  type: slider
  range: [1, 15]
  default: 2
  disabled: link_cd_amp

d_freq:
  var: hw
  type: slider
  range: [0, 10]
  default: 0.1
  disabled: link_cd_freq

# ------------------------------------------------------------------------------
#  Color
# ------------------------------------------------------------------------------

color_section:
  type: separator

invert:
  var: dz
  type: checkbox

colorize:
  var: ew
  type: slider

norm_color_disp:
  var: fw
  type: slider

band_dist:
  var: gz
  type: slider

red_or_cyan:
  var: ex
  type: slider

green_or_magenta:
  var: ey
  type: slider

blue_or_yellow:
  var: ez
  type: slider

# ------------------------------------------------------------------------------
#  Effects
# ------------------------------------------------------------------------------

effects_section:
  type: separator

feedback:
  var: gy
  type: slider

dry_add:
  var: hx
  type: slider

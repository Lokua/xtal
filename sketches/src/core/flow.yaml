# ------------------------------------------------------------------------------
#  Flow Field
# ------------------------------------------------------------------------------

_vars:
  TAU: &TAU 6.283185307179586

snapshot_sequence:
  type: snapshot_sequence
  disabled: true
  beats: 64
  snapshots: [1, 2, 3, 4, 5, 6, 7, 8, 9, 0]

flow_scale:
  var: bx
  type: slider
  range: [0.25, 5.0]
  default: 1.4
  step: 0.05

flow_speed:
  var: by
  type: slider
  range: [0.0, 2.0]
  default: 0.55
  step: 0.05

step_size:
  var: bz
  type: slider
  range: [0.002, 0.08]
  default: 0.02
  step: 0.001

steps:
  var: bw
  type: slider
  range: [8, 96]
  default: 48
  step: 1

field_twist:
  var: cx
  type: slider
  range: [0.0, 3.0]
  default: 0.9
  step: 0.05

advection_angle:
  var: cy
  type: slider
  range: [0.0, *TAU]
  default: 0.0
  step: 0.01

advection_strength:
  var: cz
  type: slider
  range: [0.0, 2.5]
  default: 0.85
  step: 0.05

line_density:
  var: cw
  type: slider
  range: [3.0, 64.0]
  default: 22.0
  step: 0.5

line_sharpness:
  var: dx
  type: slider
  range: [0.2, 4.0]
  default: 1.4
  step: 0.05

palette:
  var: dy
  type: select
  default: dune
  options:
    - dune
    - glacier
    - forest
    - ember
    - neon_cmy
    - mono_ink

palette_shift:
  var: dz
  type: slider
  range: [0.0, 1.0]
  default: 0.35
  step: 0.01

palette_contrast:
  var: dw
  type: slider
  range: [0.2, 2.0]
  default: 1.0
  step: 0.05

brightness:
  var: ex
  type: slider
  range: [0.0, 2.0]
  default: 1.15
  step: 0.01

# contrast:
#   var: ey
#   type: slider
#   range: [0.2, 2.5]
#   default: 1.25
#   step: 0.05
contrast:
  var: ey
  type: triangle
  range: [0.5, 2.0]
  beats: 8

grain:
  var: ez
  type: slider
  range: [0.0, 0.2]
  default: 0.03
  step: 0.005

vignette:
  var: ew
  type: slider
  range: [0.0, 2.0]
  default: 0.45
  step: 0.05

bands:
  type: separator

bands_count:
  var: fx
  type: slider
  range: [2, 48]
  default: 12
  step: 1

gradient_mix:
  var: fy
  type: slider
  range: [0.0, 1.0]
  default: 0.3
  step: 0.01

# parallax_mix:
#   var: gx
#   type: slider
#   range: [0.0, 1.0]
#   default: 0.45
#   step: 0.01
parallax_mix:
  var: gx
  type: triangle
  bypass: 0.5
  beats: 20
  range: [0.0, 1.0]

# warp_amount:
#   var: gy
#   type: slider
#   range: [0.0, 2.0]
#   default: 0.85
#   step: 0.05
warp_amount:
  var: gy
  type: triangle
  bypass: 0.5
  beats: 32
  range: [0.0, 2.0]

pools:
  type: separator

# pool_strength:
#   var: hx
#   type: slider
#   range: [0.0, 2.0]
#   default: 0.9
#   step: 0.05
pool_strength:
  var: hx
  type: round_robin
  bypass: 0
  beats: 16 # 1/4 of snapshot sequence beats
  values: [0.0, 2.0, 2.0, 0.0]
  slew: 0.6

pool_size:
  var: hy
  type: slider
  range: [0.1, 2.0]
  default: 0.75
  step: 0.05

pool_spin_rate:
  var: hz
  type: slider
  range: [-4.0, 4.0]
  default: 0.75
  step: 0.05

pool_angularity:
  var: hw
  type: slider
  range: [0.0, 1.0]
  default: 0.5
  step: 0.01

# ------------------------------------------------------------------------------
#  Main
# ------------------------------------------------------------------------------

t_mult:
  var: dy
  type: slider
  range: [0.125, 2]
  step: 0.125
  default: 1

detail:
  var: dz
  type: slider
  range: [0.0001, 2]
  default: 0.02

increment:
  var: dw
  type: slider
  default: 1

pos_x:
  var: fw
  type: slider
  range: [-1, 1]

pos_y:
  var: gx
  type: slider
  range: [-1, 1]

gyr_alg:
  var: fy
  type: slider

# ------------------------------------------------------------------------------
#  Ripple
# ------------------------------------------------------------------------------

ripple_section:
  type: separator

show_ripple:
  var: ex
  type: checkbox
  default: true

ripple_amp:
  var: aw
  type: slider
  default: 0.2
  disabled: not show_ripple

ripple_freq:
  var: bx
  type: slider
  range: [1, 1000]
  default: 600
  step: 1
  disabled: not show_ripple

# ------------------------------------------------------------------------------
#  Swirl
# ------------------------------------------------------------------------------

inner_section:
  type: separator

show_swirl:
  var: ey
  type: checkbox
  default: true

inner_mult:
  var: by
  type: slider
  range: [1, 100]
  default: 8
  disabled: not show_swirl

outer_mult:
  var: bz
  type: slider
  range: [0, 100]
  default: 10
  disabled: not show_swirl

outer_mult_2:
  var: bw
  type: slider
  range: [0, 20]
  default: 0.8
  disabled: not show_swirl

# ------------------------------------------------------------------------------
#  Radial
# ------------------------------------------------------------------------------

radial_section:
  type: separator

show_pulse:
  var: ez
  type: checkbox
  default: true

radial_freq:
  var: cx
  type: slider
  range: [0, 100]
  default: 10
  disabled: not show_pulse

# ------------------------------------------------------------------------------
#  Vertical Wave
# ------------------------------------------------------------------------------

v_section:
  type: separator

show_v:
  var: ew
  type: checkbox
  default: true

v_base:
  var: cy
  type: slider
  default: 0.3
  disabled: not show_v

show_fm:
  var: fx
  type: checkbox
  default: true

fm_base:
  var: dx
  type: slider
  range: [0, 10]
  default: 2
  disabled: not show_fm

fm_freq:
  var: cz
  type: slider
  default: 0.2
  disabled: not show_fm

fm_range:
  var: cw
  type: slider
  range: [0, 1000]
  default: 350
  disabled: not show_fm

# ------------------------------------------------------------------------------
#  Color
# ------------------------------------------------------------------------------

color_section:
  type: separator

colorize:
  var: hx
  type: slider

r:
  var: gy
  type: slider
  default: 1

g:
  var: gz
  type: slider
  default: 1

b:
  var: gw
  type: slider
  default: 1

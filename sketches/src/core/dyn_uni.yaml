_vars:
  TAU: &TAU 6.283185307179586

snapshot_sequence:
  type: snapshot_sequence
  disabled: true
  beats: 4
  snapshots: [1, 2, 3, 4, 5, 6, 7, 8, 9, 0]

# ------------------------------------------------------------------------------
#  Wave
# ------------------------------------------------------------------------------

wave_phase_animation:
  var: ex
  type: checkbox
  default: true

wave_phase_speed:
  type: slider
  range: [1, 32]
  step: 1
  default: 1
  disabled: not wave_phase_animation

wave_phase:
  var: bx
  type: automate
  breakpoints:
    - kind: ramp
      position: 0.0
      value: 0
    - kind: end
      position: $wave_phase_speed
      value: *TAU

wave_dist:
  var: by
  type: slider
  range: [0, 200]

link_axes:
  var: ey
  type: checkbox
  default: false
  range: [-1.0, 1.0]
  slew: 0.65
  stem: 88

wave_x_freq:
  var: bz
  type: slider
  range: [0, 100]

wave_y_freq:
  var: bw
  type: slider
  range: [0, 100]
  disabled: link_axes

origin:
  var: ez
  type: select
  default: center
  options:
    - center
    - top-right
    - bottom-right
    - bottom-left
    - top-left
    - animated
    - animated-y

origin_offset:
  var: ew
  type: slider
  disabled: origin is center

origin_anim_x:
  var: gx
  type: random_slewed
  beats: 16
  range: [-1, 1]
  slew: 0.8
  stem: 94

origin_anim_y:
  var: gy
  type: random_slewed
  beats: 8
  range: [-1, 1]
  slew: 0.8
  stem: 95

# ------------------------------------------------------------------------------
#  Color
# ------------------------------------------------------------------------------

color_separator:
  type: separator

color_invert:
  var: dw
  type: checkbox

color_amt:
  var: cx
  type: slider
  range: [0, 2]
  default: 0.5

color_freq:
  var: cy
  type: slider
  range: [0, 20]

color_phase:
  var: cz
  type: slider
  range: [0, *TAU]
  step: 0.001

r_amp:
  var: cw
  type: slider

g_amp:
  var: dx
  type: slider

b_amp:
  var: dy
  type: slider

color_shift:
  var: dz
  type: slider
  range: [0, *TAU]

color_steps:
  var: fw
  type: slider
  range: [1, 50]
  step: 1

bg_alpha:
  var: hy
  type: slider
  default: 1

# ------------------------------------------------------------------------------
#  Distance Params
# ------------------------------------------------------------------------------

pattern_separator:
  type: separator

distance_mix:
  var: fz
  type: slider

grain_size:
  var: fx
  type: slider
  range: [0, 10]

angle_mult:
  var: fy
  type: slider
  range: [0, 10]

p2_x:
  var: gz
  type: slider
  range: [0, 100]
  default: 1

p2_y:
  var: gw
  type: slider
  range: [0, 100]
  default: 1

# ------------------------------------------------------------------------------
#  Post Processing
# ------------------------------------------------------------------------------

post_separator:
  type: separator

film_grain:
  var: hx
  type: slider
  range: [0, 2]

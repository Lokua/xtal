grid_size:
  var: aw
  type: slider
  range: [9, 97]
  default: 33
  step: 2

circle_size:
  var: bx
  type: slider
  range: [0.02, 0.49]
  default: 0.28
  step: 0.005

pulse_rate:
  var: by
  type: slider
  range: [0.25, 4.0]
  default: 1.0
  step: 0.25

pulse_influence:
  var: bz
  type: slider
  range: [0.01, 0.5]
  default: 0.12
  step: 0.005
